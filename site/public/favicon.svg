<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <rect x="3" y="14" width="26" height="4" rx="2" class="track" />
    <rect x="3" y="14" width="17" height="4" rx="2" class="fill" />
    <circle cx="20" cy="16" r="4.5" class="marker" />
    <style>
        .track { fill: #c3c2b7; }
        .fill, .marker { fill: #2a78d6; }
        .marker { stroke: #fcfcfb; stroke-width: 2; }
        @media (prefers-color-scheme: dark) {
            .track { fill: #383835; }
            .fill, .marker { fill: #3987e5; }
            .marker { stroke: #1a1a19; }
        }
    </style>
</svg>
